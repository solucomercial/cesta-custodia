version: "3.8"

services:
  # Banco de Dados
  db:
    image: postgres:15-alpine
    container_name: cesta-custodia-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-cesta_custodia}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  # API (Fastify)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cesta-custodia-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-cesta_custodia}
      JWT_SECRET: ${JWT_SECRET:-mude-isso-em-producao}
      FRONTEND_ORIGIN: http://localhost:3000
    depends_on:
      - db
    ports:
      - "3333:3333"
    networks:
      - backend-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333
    container_name: cesta-custodia-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data: